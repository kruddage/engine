<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KRUDD</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
	background: #0d0d0d;
	color: #e0e0e0;
	font-family: 'Courier New', Courier, monospace;
	height: 100vh;
	display: flex;
	flex-direction: column;
	overflow: hidden;
}

header {
	padding: 10px 20px;
	display: flex;
	align-items: center;
	gap: 12px;
	border-bottom: 1px solid #222;
	flex-shrink: 0;
}

.wordmark {
	font-size: 18px;
	font-weight: bold;
	letter-spacing: 0.2em;
	color: #fff;
}

.version {
	font-size: 11px;
	color: #555;
	letter-spacing: 0.1em;
}

.canvas-wrap {
	flex: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	background: #000;
	min-height: 0;
}

canvas {
	display: block;
	max-width: 100%;
	max-height: 100%;
	width: 100%;
	height: 100%;
}

footer {
	padding: 6px 20px;
	border-top: 1px solid #222;
	font-size: 11px;
	color: #444;
	display: flex;
	align-items: center;
	gap: 8px;
	flex-shrink: 0;
}

.status-dot {
	width: 6px;
	height: 6px;
	border-radius: 50%;
	background: #2d6a2d;
	animation: pulse 2s ease-in-out infinite;
}

.status-dot.error {
	background: #6a2d2d;
	animation: none;
}

@keyframes pulse {
	0%, 100% { opacity: 1; }
	50%       { opacity: 0.3; }
}

/* ── Error overlay ── */

.error-backdrop {
	position: fixed;
	inset: 0;
	background: rgba(0, 0, 0, 0.75);
	display: none;
	align-items: center;
	justify-content: center;
	z-index: 9999;
	padding: 20px;
}

.error-backdrop.visible {
	display: flex;
}

.error-box {
	background: #111;
	border: 1px solid #5a1a1a;
	border-top: 3px solid #c0392b;
	max-width: 680px;
	width: 100%;
	max-height: 80vh;
	display: flex;
	flex-direction: column;
	box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
}

.error-header {
	padding: 12px 16px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	border-bottom: 1px solid #2a1a1a;
	flex-shrink: 0;
}

.error-title-row {
	display: flex;
	align-items: center;
	gap: 10px;
}

.error-icon {
	color: #c0392b;
	font-size: 14px;
	font-weight: bold;
}

.error-label {
	font-size: 13px;
	color: #e74c3c;
	font-weight: bold;
	letter-spacing: 0.05em;
}

.error-source {
	font-size: 11px;
	color: #555;
}

.error-dismiss {
	background: none;
	border: 1px solid #333;
	color: #666;
	font-family: inherit;
	font-size: 11px;
	padding: 3px 10px;
	cursor: pointer;
	letter-spacing: 0.05em;
}

.error-dismiss:hover {
	border-color: #555;
	color: #aaa;
}

.error-body {
	padding: 14px 16px;
	overflow-y: auto;
	font-size: 12px;
	line-height: 1.6;
	color: #ccc;
	white-space: pre-wrap;
	word-break: break-all;
	flex: 1;
}
</style>
</head>
<body>

<header>
	<span class="wordmark">KRUDD</span>
	<span class="version">engine v0.1</span>
</header>

<div class="canvas-wrap">
	<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
</div>

<footer>
	<div class="status-dot" id="status-dot"></div>
	<span id="status">loading</span>
</footer>

<div class="error-backdrop" id="error-backdrop">
	<div class="error-box">
		<div class="error-header">
			<div class="error-title-row">
				<span class="error-icon">!</span>
				<span class="error-label" id="error-label"></span>
				<span class="error-source">index.wasm</span>
			</div>
			<button class="error-dismiss" id="error-dismiss">dismiss</button>
		</div>
		<div class="error-body" id="error-body"></div>
	</div>
</div>

<script>
	document.getElementById('error-dismiss').addEventListener('click', function () {
		document.getElementById('error-backdrop').classList.remove('visible');
	});

	/* Called by error_overlay.js */
	window.kruddShowError = function (title, detail) {
		document.getElementById('error-label').textContent = title;
		document.getElementById('error-body').textContent = detail;
		document.getElementById('error-backdrop').classList.add('visible');
		var dot = document.getElementById('status-dot');
		dot.classList.add('error');
		document.getElementById('status').textContent = 'exception';
	};

	/* Signal that the engine is running (called after Module init) */
	window.kruddSetRunning = function () {
		document.getElementById('status').textContent = 'running';
	};
</script>

{{{ SCRIPT }}}

</body>
</html>
