name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build_san -DSANITIZE=ON

      - name: Build
        run: cmake --build build_san

      - name: Run tests
        run: ctest --test-dir build_san --output-on-failure
