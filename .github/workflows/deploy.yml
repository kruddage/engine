name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build and stage the site. This job never touches gh-pages; it only produces
  # the `site` artifact that the pages-deploy workflow publishes.
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Root-in-container trips git's "dubious ownership" guard; stage-site.sh
      # reads the commit hash via git, so mark the checkout safe first.
      - name: Trust the workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # Stage only the web outputs. Publishing the raw build/ tree would commit
      # _deps/ (a gitlink) to gh-pages and break the Pages branch build.
      - name: Stage site
        run: sh scripts/stage-site.sh build public

      - name: Upload staged site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public

  # Hand the staged site to the single gh-pages writer. The concurrency lock and
  # keep_files coexistence logic live there, not here.
  deploy:
    needs: build
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    uses: ./.github/workflows/pages-deploy.yml
    with:
      mode: main
