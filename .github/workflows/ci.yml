name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The container runs as root, so git refuses to touch the checkout
      # ("dubious ownership") and stage-site.sh would stamp "unknown" instead
      # of the commit hash. Mark it safe first.
      - name: Trust the workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install a host compiler for krudd
        run: apt-get update && apt-get install -y gcc

      - name: Build
        env:
          KRUDD_CONFIGURE: emcmake cmake -S cmake -B build -DCMAKE_BUILD_TYPE=Release
        run: ./krudd.sh build

      - name: Stage site
        run: sh scripts/stage-site.sh build public

      - name: Upload staged site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: public
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download staged site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: public

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
