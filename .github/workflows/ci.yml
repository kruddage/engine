name: CI

on:
  pull_request:
    # `closed` is included so the preview job can tear down a PR's preview
    # directory when the PR is merged or closed. The default set is
    # [opened, synchronize, reopened]; adding closed keeps those and adds it.
    types: [opened, reopened, synchronize, closed]
  push:
    branches: [main]

jobs:
  lint:
    # Skip on PR-close events — nothing to lint then.
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint .scm comments
        run: python3 .github/scripts/lint-scm-comments.py $(git ls-files '*.scm')

  build:
    # Skip the build on PR-close events — there is nothing to publish, the
    # preview job only needs to remove the stale directory.
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The container runs as root, so git refuses to touch the checkout
      # ("dubious ownership") and stage-site.sh would stamp "unknown" instead
      # of the commit hash. Mark it safe first.
      - name: Trust the workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # krudd.sh picks clang first if it's on PATH, falling back to gcc then
      # cc, so installing clang here makes CI build with it by default while
      # keeping gcc as the fallback compiler. curl is needed by
      # krudd/third_party/sync.sh as a fallback if the committed s7.c/s7.h
      # ever go missing or fail their checksum.
      - name: Install a host compiler and ninja for krudd
        run: apt-get update && apt-get install -y clang gcc ninja-build curl

      # The released version is the single line in version.txt, maintained by
      # release-please (see .github/workflows/release-please.yml). A push/main
      # build stamps that version verbatim. A PR build appends -pr<N>+<sha> so
      # its preview is uniquely identifiable and can never be mistaken for a
      # real release — mirroring the prerelease suffix the old label-fold job
      # produced.
      # This runs under `sh` (dash) inside the emsdk container, so keep it
      # POSIX: printf '%.7s' truncates to 7 chars where bash would use the
      # non-portable ${sha:0:7}.
      - name: Determine version
        id: version
        run: |
          base=$(cat version.txt)
          if [ "${{ github.event_name }}" = pull_request ]; then
            short=$(printf '%.7s' "${{ github.event.pull_request.head.sha }}")
            echo "version=${base}-pr${{ github.event.pull_request.number }}+${short}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${base}" >> "$GITHUB_OUTPUT"
          fi

      # krudd generates a build.ninja from the directory specs and drives ninja
      # with emcc/em++ directly — no cmake, no emcmake. KRUDD_TARGET=wasm selects
      # the WASM output (the single index.html/.js/.wasm module). KRUDD_VERSION
      # comes from the version step above — see introspect.scm.
      - name: Build
        env:
          KRUDD_TARGET: wasm
          KRUDD_VERSION: ${{ steps.version.outputs.version }}
        run: ./krudd.sh build

      - name: Stage site
        run: sh .github/scripts/stage-site.sh build public

      - name: Upload staged site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: public
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download staged site
        uses: actions/download-artifact@v8
        with:
          name: site
          path: public

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # keep_files preserves the pr-preview/ directory tree that the
          # preview job writes into the same gh-pages branch; without it a
          # main deploy would delete every open PR's preview. The trade-off is
          # that old hash-named index.<hash>.{js,wasm} from previous main
          # deploys are no longer pruned and accumulate at the site root.
          keep_files: true

  # Publishes each pull request's staged build to
  # gh-pages/pr-preview/pr-<N>/ and comments the preview URL on the PR, then
  # removes that directory when the PR is closed or merged. Scoped to
  # same-repository PRs: the pull_request token is read-only for forks, so a
  # fork PR cannot push to gh-pages. (Supporting forks safely would require a
  # separate pull_request_target/workflow_run job that deploys outside the
  # untrusted build context.)
  preview:
    needs: build
    # !cancelled() lifts the implicit "needs succeeded" gate so this still runs
    # on the close event (where build is skipped). Deploys only when the build
    # succeeded; the close path tears down regardless of the build.
    if: >-
      ${{ !cancelled() && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (github.event.action == 'closed' || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    # This job only publishes a convenience preview deploy; it isn't a
    # correctness gate (lint/build/sanitizers/coverage already cover that).
    # A gh-pages push race or preview-action hiccup shouldn't hold up
    # auto-merge, so let it fail without failing the job.
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    # Serialize a single PR's preview runs so rapid pushes don't race each
    # other pushing to gh-pages; keyed per-PR so different PRs stay independent.
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7

      - name: Download staged site
        if: github.event.action != 'closed'
        uses: actions/download-artifact@v8
        with:
          name: site
          path: public

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: public
          preview-branch: gh-pages
          umbrella-dir: pr-preview

  # Does the engine actually RENDER under WebGPU? A total WebGPU blackout
  # (#622) shipped through eight commits because nothing watched the browser
  # path: the native suite is structurally blind to it, and render-diff — which
  # can see it — is hand-run. This is the standing gate.
  #
  # Deliberately binary: zero WebGPU validation errors and a non-blank canvas.
  # NOT a render-diff parity threshold, which swings several points run to run
  # and would be flaky from day one.
  #
  # Runs at dpr 1 AND dpr 3. A dpr-1 runner cannot see the class of canvas
  # sizing bug that #610 fixed, because CSS pixels and device pixels are the
  # same number there.
  #
  # Reuses the `build` job's staged site rather than rebuilding: staging is
  # what resolves the hashed wasm filename index.html asks for, so serving the
  # raw build tree would 404 the module and fail for the wrong reason.
  webgpu-smoke:
    needs: build
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download staged site
        uses: actions/download-artifact@v8
        with:
          name: site
          path: public

      # lavapipe is the software Vulkan driver the runner needs to expose a
      # WebGPU adapter at all — GitHub runners have no GPU. xvfb because
      # headless Chrome composites a WebGPU canvas blank while reporting the
      # device is live, which would make this gate confirm a broken instrument.
      - name: Install Chrome, xvfb and a software Vulkan driver
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-vulkan-drivers
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Serve the staged site
        run: |
          python3 -m http.server -d public 8000 &
          for i in $(seq 1 20); do
            curl -sf -o /dev/null http://127.0.0.1:8000/index.html && break
            sleep 0.5
          done

      - name: WebGPU smoke (dpr 1 and dpr 3)
        run: node tools/webgpu-smoke/smoke.mjs --base http://127.0.0.1:8000/index.html --dpr 1,3

  # Build and run the native test suite under AddressSanitizer + UBSan +
  # LeakSanitizer. This is the memory-safety / undefined-behaviour gate: a
  # detected leak, out-of-bounds access, or UB fails the job. It runs on a
  # plain ubuntu-latest (no emsdk container) because sanitizers need a native
  # host build — the CI `build` job only produces the WASM artifact. gcc is
  # used because its libasan/libubsan runtimes ship with the runner image;
  # the sanitizer flags ride in through kruddmake's KRUDD_EXTRA_* env hooks so
  # this is the ordinary native build with instrumentation, not a fork of it.
  sanitizers:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc g++ ninja-build curl

      - name: Build + run native suite under ASan + UBSan + LeakSanitizer
        env:
          CC: gcc
          KRUDD_CC: gcc
          KRUDD_CXX: g++
          KRUDD_BUILD_DIR: ${{ github.workspace }}/build-san
          KRUDD_EXTRA_CFLAGS: >-
            -fsanitize=address,undefined -fno-omit-frame-pointer
            -fno-sanitize-recover=undefined -g -O1
          KRUDD_EXTRA_LDFLAGS: -fsanitize=address,undefined
          # Fail the run on the first leak / error rather than only printing it.
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: sh krudd/kruddmake/run-tests.sh

  # Measure native line/function/branch coverage with gcov and post it as a
  # sticky comment on the PR. This is REPORT-ONLY — it never fails the build;
  # the floor gate is intentionally deferred until the baseline has been
  # watched (see README). Coverage needs its own -O0 --coverage build, so it
  # runs separately from the sanitizer job in its own build directory.
  coverage:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y gcc g++ ninja-build curl
          pipx install gcovr

      - name: Build + run native suite with gcov instrumentation
        env:
          CC: gcc
          KRUDD_CC: gcc
          KRUDD_CXX: g++
          KRUDD_BUILD_DIR: ${{ github.workspace }}/build-cov
          KRUDD_EXTRA_CFLAGS: --coverage -O0 -g -fprofile-abs-path
          KRUDD_EXTRA_LDFLAGS: --coverage
        run: sh krudd/kruddmake/run-tests.sh

      # Scope to engine production code: test files and vendored third_party/
      # are excluded so the number reflects code the suite is meant to cover.
      - name: Generate coverage report
        run: |
          gcovr --root . --filter 'krudd/engine/' \
            --exclude '.*_test\.c$' --exclude 'krudd/third_party/' \
            --gcov-object-directory build-cov --gcov-ignore-parse-errors=all \
            --json-summary coverage-summary.json --txt coverage.txt
          cat coverage.txt
          python3 .github/scripts/coverage-report.py \
            coverage-summary.json coverage-comment.md

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.txt
            coverage-comment.md

      # Only same-repo PRs: a fork PR's GITHUB_TOKEN is read-only, so the
      # measurement still runs above but the comment post is skipped for forks.
      - name: Post coverage comment
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage-comment.md', 'utf8');
            const marker = '<!-- krudd-coverage-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(
              c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner, repo, issue_number, body });
            }
