# Dependabot keeps our pinned dependencies current so pins don't rot.
#
# Today the GitHub Actions we use float on major tags (actions/checkout@v4 etc.);
# once those are SHA-pinned (part of #309), Dependabot opens PRs that bump the
# pin and update the trailing version comment, keeping "pinned but current".
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # prefix "ci" makes Dependabot's squash title a Conventional Commit
    # (ci: ...), which release-please records in the changelog without bumping
    # the version — the successor to the old release:chore label.
    commit-message:
      prefix: "ci"
