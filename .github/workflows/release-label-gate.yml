name: Release Label Gate

# Fails a PR unless it carries exactly one release:* label. The labels
# themselves are defined in .github/labels.yml and synced by sync-labels.yml —
# this job only checks which ones are attached, it never creates them.
on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]

jobs:
  release-label-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Require exactly one release label
        uses: actions/github-script@v9
        with:
          script: |
            const required = [
              'release:feature',
              'release:fix',
              'release:breaking',
              'release:chore',
            ]
            const labels = context.payload.pull_request.labels.map(l => l.name)
            const present = labels.filter(l => required.includes(l))

            if (present.length !== 1) {
              core.setFailed(
                `PR must carry exactly one of ${required.join(', ')} — ` +
                `found: ${present.length ? present.join(', ') : '(none)'}`
              )
            }
