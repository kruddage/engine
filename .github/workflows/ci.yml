name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          cache: true

      - name: Build
        run: |
          emcmake cmake -B build
          cmake --build build

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-sanitizers-${{ github.sha }}
          restore-keys: ccache-sanitizers-

      - name: Configure
        run: cmake -B build_san -DSANITIZE=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_san

      - name: Run tests
        run: ctest --test-dir build_san --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov and ccache
        run: sudo apt-get install -y lcov ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-coverage-${{ github.sha }}
          restore-keys: ccache-coverage-

      - name: Configure
        run: cmake -B build -DCOVERAGE=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors empty
          lcov --remove coverage.info '*/usr/*' '*/_deps/*' '*_test.c' --output-file coverage.info --ignore-errors empty

      - name: Check coverage threshold
        run: |
          pct=$(lcov --summary coverage.info 2>&1 | awk '/lines/{gsub(/%/,"",$2); print int($2)}')
          echo "Line coverage: ${pct}%"
          if [ "${pct}" -lt 80 ]; then
            echo "Coverage ${pct}% is below the 80% threshold" >&2
            exit 1
          fi

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -B build

      - name: Run clang-tidy
        run: run-clang-tidy -p build '.*(modules|plugins)/.*(?<!_test)\.c$'

  preview:
    if: github.event_name == 'pull_request'
    needs: [build, sanitizers, coverage, clang-tidy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          cache: true

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-preview-${{ github.sha }}
          restore-keys: ccache-preview-

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build build

      # Stage only the web outputs. Publishing the raw build/ tree would commit
      # _deps/ (a gitlink) to gh-pages and break the Pages branch build.
      - name: Stage site
        run: sh scripts/stage-site.sh build public

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: public
