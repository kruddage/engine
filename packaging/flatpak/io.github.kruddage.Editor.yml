id: io.github.kruddage.Editor
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: krudd-editor-qt

# Vulkan for the native backend, plus a display socket. No filesystem/network
# access requested — the editor doesn't need it yet.
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  # The whole editor — krudd_qt.cpp, the rest of the engine, kruddmake itself —
  # compiles fresh in here against org.kde.Sdk's own Qt6 (matching the
  # org.kde.Platform runtime's Qt6 at run time, unlike a binary built against
  # the CI runner's system Qt) and the SDK's Vulkan loader + headers. Nothing is
  # vendored: the native GPU path is Vulkan now, an ordinary system dependency
  # the SDK already provides, so there is no prebuilt library to stage in (the
  # old native-Dawn module is gone).
  - name: krudd-editor
    buildsystem: simple
    build-commands:
      # Generate build.ninja with the Vulkan + Qt targets configured, then build
      # only the editor binary (compile + link) rather than the whole native
      # suite. KRUDD_GENERATE_ONLY stops krudd.sh short of driving ninja itself.
      #
      # krudd_qt.cpp needs one QPA private header for the Wayland surface
      # lookup, which pkg-config does not report. org.kde.Sdk ships the private
      # headers under <includedir>/QtGui/<ver>; derive that from pkg-config so
      # this keeps working across runtime-version bumps.
      - >-
        cd krudd-src &&
        KRUDD_VULKAN=1 KRUDD_QT=1 KRUDD_GENERATE_ONLY=1
        KRUDD_QT_CFLAGS="$(pkg-config --cflags Qt6Widgets Qt6Gui Qt6Core)
        -I$(pkg-config --variable=includedir Qt6Gui)/QtGui/$(pkg-config --modversion Qt6Gui)"
        KRUDD_QT_LIBS="$(pkg-config --libs Qt6Widgets Qt6Gui Qt6Core)"
        ./krudd.sh build
      - ninja -C krudd-src/build -f build.ninja bin/krudd_qt
      - install -Dm755 krudd-src/build/bin/krudd_qt /app/bin/krudd-editor-qt
      - install -Dm644 krudd-src/packaging/flatpak/io.github.kruddage.Editor.desktop
        /app/share/applications/io.github.kruddage.Editor.desktop
      # AppStream metainfo + a 512x512 icon named for the app id. Without these
      # Plasma Discover (the SteamOS Desktop store) won't list or tile the app,
      # even from a configured remote. The icon is the engine's existing PWA
      # icon, reused straight from source — no duplicate binary in packaging/.
      - install -Dm644 krudd-src/packaging/flatpak/io.github.kruddage.Editor.metainfo.xml
        /app/share/metainfo/io.github.kruddage.Editor.metainfo.xml
      - install -Dm644 krudd-src/krudd/engine/core/icon-512.png
        /app/share/icons/hicolor/512x512/apps/io.github.kruddage.Editor.png
    sources:
      - type: dir
        path: ../..
        dest: krudd-src
        skip:
          - .git
          - build
          - build-*
          - packaging/flatpak/build-dir
          - packaging/flatpak/export-repo
