name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build
        run: |
          emcmake cmake -B build
          cmake --build build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure
        run: cmake -B build_test -DCOVERAGE=ON

      - name: Build
        run: cmake --build build_test

      - name: Run tests
        run: ctest --test-dir build_test --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build_test --output-file coverage.info --ignore-errors empty
          lcov --remove coverage.info '*/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info --ignore-errors empty

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        run: |
          output=$(npx wrangler@3 pages deploy build \
            --project-name=engine \
            --branch="${GITHUB_HEAD_REF}" 2>&1)
          printf '%s\n' "$output"
          url=$(printf '%s\n' "$output" | grep -oE 'https://[a-z0-9-]+\.pages\.dev' | tail -1)
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9b420ba27330d12b7631a3abf1f7a69

      - name: Post preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            if (!url) { core.warning('no preview URL found in deploy output'); return; }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Preview\n\n✅ ${url}`,
            });
