<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>krudd 11.4.1</title>
<!-- Inline SVG favicon (data URI, no network fetch) so browsers stop
     requesting /favicon.ico and logging a 404 on every load. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%230d0d0d'/%3E%3Ctext%20x='16'%20y='23'%20font-family='Courier%20New,monospace'%20font-size='22'%20font-weight='700'%20fill='%23ffffff'%20text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
	background: #0d0d0d;
	color: #e0e0e0;
	font-family: 'Courier New', Courier, monospace;
	height: 100vh;
	display: flex;
	flex-direction: column;
	overflow: hidden;
}

header {
	padding: 10px 20px;
	display: flex;
	align-items: center;
	gap: 12px;
	border-bottom: 1px solid #222;
	flex-shrink: 0;
}

.wordmark {
	font-size: 18px;
	font-weight: bold;
	letter-spacing: 0.2em;
	color: #fff;
}

.version {
	font-size: 11px;
	color: #555;
	letter-spacing: 0.1em;
	cursor: pointer;
	user-select: none;
}

.version:hover {
	color: #888;
}

.version-detail {
	display: none;
	font-size: 11px;
	color: #444;
	letter-spacing: 0.05em;
}

.version-detail.visible {
	display: inline;
}

.canvas-wrap {
	flex: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	background: #000;
	min-height: 0;
}

canvas {
	display: block;
	max-width: 100%;
	max-height: 100%;
	width: 100%;
	height: 100%;
}

footer {
	padding: 6px 20px;
	border-top: 1px solid #222;
	font-size: 11px;
	color: #444;
	display: flex;
	align-items: center;
	gap: 8px;
	flex-shrink: 0;
}

.status-dot {
	width: 6px;
	height: 6px;
	border-radius: 50%;
	background: #2d6a2d;
	animation: pulse 2s ease-in-out infinite;
}

.status-dot.error {
	background: #6a2d2d;
	animation: none;
}

@keyframes pulse {
	0%, 100% { opacity: 1; }
	50%       { opacity: 0.3; }
}

/* ── Error overlay ── */

.error-backdrop {
	position: fixed;
	inset: 0;
	background: rgba(0, 0, 0, 0.75);
	display: none;
	align-items: center;
	justify-content: center;
	z-index: 9999;
	padding: 20px;
}

.error-backdrop.visible {
	display: flex;
}

.error-box {
	background: #111;
	border: 1px solid #5a1a1a;
	border-top: 3px solid #c0392b;
	max-width: 720px;
	width: 100%;
	max-height: 80vh;
	display: flex;
	flex-direction: column;
	box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
}

.error-header {
	padding: 12px 16px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 16px;
	border-bottom: 1px solid #2a1a1a;
	flex-shrink: 0;
}

.error-title-row {
	display: flex;
	align-items: center;
	gap: 8px;
	flex: 1;
	min-width: 0;
	overflow: hidden;
}

.error-icon {
	color: #c0392b;
	font-size: 14px;
	font-weight: bold;
	flex-shrink: 0;
}

.error-label {
	font-size: 13px;
	color: #e74c3c;
	font-weight: bold;
	letter-spacing: 0.05em;
	flex-shrink: 0;
}

.error-source {
	font-size: 11px;
	color: #555;
	padding-right: 4px;
}

.error-actions {
	display: flex;
	align-items: center;
	gap: 8px;
	flex-shrink: 0;
}

.error-dismiss,
.error-copy {
	background: none;
	border: 1px solid #333;
	color: #666;
	font-family: inherit;
	font-size: 11px;
	padding: 3px 10px;
	cursor: pointer;
	letter-spacing: 0.05em;
}

.error-dismiss:hover,
.error-copy:hover {
	border-color: #555;
	color: #aaa;
}

.error-copy.copied {
	border-color: #2d6a2d;
	color: #4a9a4a;
}

.error-body {
	padding: 14px 16px;
	overflow-y: auto;
	font-size: 12px;
	line-height: 1.6;
	color: #ccc;
	flex: 1;
	font-family: system-ui, -apple-system, sans-serif;
}

.error-body h2 {
	font-family: 'Courier New', Courier, monospace;
	color: #e74c3c;
	font-size: 13px;
	margin-bottom: 10px;
	font-weight: bold;
	letter-spacing: 0.03em;
}

.error-body h3 {
	font-family: 'Courier New', Courier, monospace;
	color: #b0b0b0;
	font-size: 12px;
	margin: 10px 0 6px;
	font-weight: bold;
	text-transform: uppercase;
	letter-spacing: 0.08em;
}

.error-body p {
	margin-bottom: 8px;
	color: #bbb;
}

.error-body strong { color: #ddd; font-weight: bold; }

.error-body code {
	font-family: 'Courier New', Courier, monospace;
	background: #1a1a1a;
	border: 1px solid #2a2a2a;
	color: #e0a05a;
	padding: 1px 5px;
	font-size: 11px;
	border-radius: 2px;
}

.error-body pre {
	background: #0a0a0a;
	border: 1px solid #222;
	border-left: 3px solid #5a1a1a;
	padding: 10px 12px;
	margin: 8px 0;
	overflow-x: auto;
	font-size: 11px;
	line-height: 1.5;
}

.error-body pre code {
	background: none;
	border: none;
	padding: 0;
	color: #ccc;
	font-size: 11px;
}

.error-body hr {
	border: none;
	border-top: 1px solid #222;
	margin: 10px 0;
}
</style>
</head>
<body>

<header>
	<span class="wordmark">KRUDD</span>
	<span class="version" id="version" title="click for build info">11.4.1</span>
	<span class="version-detail" id="version-detail">commit d69eb6d &middot; built 2026-07-10</span>
</header>

<div class="canvas-wrap">
	<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
</div>

<footer>
	<div class="status-dot" id="status-dot"></div>
	<span id="status">loading</span>
</footer>

<div class="error-backdrop" id="error-backdrop">
	<div class="error-box">
		<div class="error-header">
			<div class="error-title-row">
				<span class="error-icon">!</span>
				<span class="error-label" id="error-label"></span>
			</div>
			<div class="error-actions">
				<span class="error-source">index.wasm</span>
				<button class="error-copy" id="error-copy">copy</button>
				<button class="error-dismiss" id="error-dismiss">dismiss</button>
			</div>
		</div>
		<div class="error-body" id="error-body"></div>
	</div>
</div>

<script>
	function renderMarkdown(src) {
		var lines = src.split('\n');
		var out = '';
		var i = 0;

		function esc(s) {
			return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		}

		function inline(s) {
			s = esc(s);
			s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
			s = s.replace(/`([^`]+)`/g, function(_, c) { return '<code>' + c + '</code>'; });
			return s;
		}

		while (i < lines.length) {
			var line = lines[i];

			if (/^```/.test(line)) {
				var code = [];
				i++;
				while (i < lines.length && !/^```/.test(lines[i]))
					code.push(esc(lines[i++]));
				out += '<pre><code>' + code.join('\n') + '</code></pre>';
				i++;
				continue;
			}
			if (/^## /.test(line))  { out += '<h2>' + inline(line.slice(3)) + '</h2>'; i++; continue; }
			if (/^### /.test(line)) { out += '<h3>' + inline(line.slice(4)) + '</h3>'; i++; continue; }
			if (/^---+$/.test(line.trim())) { out += '<hr>'; i++; continue; }
			if (/^\s*$/.test(line)) { i++; continue; }
			out += '<p>' + inline(line) + '</p>';
			i++;
		}
		return out;
	}

	function errorToMarkdown(detail) {
		var m = detail.match(/^([^\n]+)\n([\s\S]+)$/);
		var message = m ? m[1] : detail;
		var stack   = m ? m[2] : null;
		var md = '## ' + message + '\n\n';
		if (stack)
			md += '### Stack trace\n\n```\n' + stack.trim() + '\n```\n';
		return md;
	}

	document.getElementById('error-dismiss').addEventListener('click', function () {
		document.getElementById('error-backdrop').classList.remove('visible');
	});

	document.getElementById('error-copy').addEventListener('click', function () {
		var btn = this;
		var raw = document.getElementById('error-body').dataset.raw || '';
		navigator.clipboard.writeText(raw).then(function () {
			btn.textContent = 'copied!';
			btn.classList.add('copied');
			setTimeout(function () {
				btn.textContent = 'copy';
				btn.classList.remove('copied');
			}, 2000);
		});
	});

	/* Called by error_overlay.js */
	window.kruddShowError = function (title, detail) {
		document.getElementById('error-label').textContent = title;
		var body = document.getElementById('error-body');
		body.dataset.raw = title + ': ' + detail;
		body.innerHTML = renderMarkdown(errorToMarkdown(detail));
		document.getElementById('error-backdrop').classList.add('visible');
		document.getElementById('status-dot').classList.add('error');
		document.getElementById('status').textContent = 'exception';
	};

	/* Signal that the engine is running (called after Module init) */
	window.kruddSetRunning = function () {
		document.getElementById('status').textContent = 'running';
	};

	document.getElementById('version').addEventListener('click', function () {
		document.getElementById('version-detail').classList.toggle('visible');
	});
</script>

<script>
var Module = {
	locateFile: function (path, prefix) {
		if (path.endsWith('.wasm'))
			return prefix + path.replace(/\.wasm$/, '.d69eb6d.wasm');
		return prefix + path;
	}
};
</script>

<script async type="text/javascript" src="index.d69eb6d.js"></script>

</body>
</html>
