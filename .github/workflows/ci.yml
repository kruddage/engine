name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Toolchain is baked into the pinned image, so no per-job SDK install. Pin
    # matches the emsdk version the other jobs and local builds use (#261).
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The container runs as root, so git refuses to touch the checkout
      # ("detected dubious ownership") and silently falls back — stage-site.sh
      # would stamp "unknown" instead of the commit hash. Mark it safe first.
      - name: Trust the workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install ccache
        run: apt-get update && apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-wasm-${{ github.sha }}
          restore-keys: ccache-wasm-

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build build

      # A side module's function imports are resolved at dlopen time; any that
      # the main module / other plugins do not provide become stubs that THROW
      # at runtime (invisible to a link-only build). Trap that class here.
      - name: Check plugin symbol resolution
        run: |
          node scripts/check-plugin-symbols.test.mjs
          node scripts/check-plugin-symbols.mjs build

  # EM_ASM_* macros silently break in side modules (SIDE_MODULE=1): no compile
  # or link error, just a runtime throw. Ban them in plugin sources by path —
  # a pure source grep, so it needs no toolchain and fails fast.
  plugin-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test the lint checks
        run: |
          sh scripts/check-plugin-no-em-asm.test.sh
          sh scripts/check-plugin-imports.test.sh

      - name: Ban EM_ASM_* in plugin sources
        run: sh scripts/lint em-asm

  # modules/memory/ is the sole allocator seam (wraps mimalloc). A raw
  # malloc/free/realloc/calloc anywhere else bypasses it invisibly — no
  # compile or link error, it just silently escapes the engine's allocator.
  # A pure source grep, so it needs no toolchain and fails fast.
  malloc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test the lint checks
        run: sh scripts/check-no-raw-malloc.test.sh

      - name: Ban raw malloc/free/realloc/calloc outside modules/memory/
        run: sh scripts/lint raw-malloc

  sanitizers:
    # Pin the runner image so the native toolchain — and thus sanitizer
    # behaviour — is deterministic rather than floating with ubuntu-latest (#308).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-sanitizers-${{ github.sha }}
          restore-keys: ccache-sanitizers-

      - name: Configure
        run: cmake -B build_san -DSANITIZE=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_san

      - name: Run tests
        run: ctest --test-dir build_san --output-on-failure

  coverage:
    # Pin the runner image so lcov's version — and therefore the coverage
    # percentage the gate compares against 80 — doesn't drift with the image (#308).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov and ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov ccache

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-coverage-${{ github.sha }}
          restore-keys: ccache-coverage-

      - name: Configure
        run: cmake -B build -DCOVERAGE=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors empty
          lcov --remove coverage.info '*/usr/*' '*/_deps/*' '*_test.c' --output-file coverage.info --ignore-errors unused,empty

      - name: Check coverage threshold
        run: |
          pct=$(lcov --summary coverage.info 2>&1 | awk '/lines/{gsub(/%/,"",$2); print int($2)}')
          echo "Line coverage: ${pct}%"
          if [ "${pct}" -lt 80 ]; then
            echo "Coverage ${pct}% is below the 80% threshold" >&2
            exit 1
          fi

  clang-tidy:
    # Pin the runner image so clang-tidy's version — and thus which findings
    # fire — is stable rather than floating with ubuntu-latest (#308).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -B build

      - name: Run clang-tidy
        run: run-clang-tidy -p build '.*(modules|plugins)/.*(?<!_test)\.c$'

  # Build and stage the Release site for the PR preview. This job never touches
  # gh-pages; it only produces the `site` artifact that pages-deploy publishes.
  preview-build:
    if: github.event_name == 'pull_request'
    needs: [plugin-lint, malloc-lint, build, sanitizers, coverage, clang-tidy]
    runs-on: ubuntu-latest
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust the workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install ccache
        run: apt-get update && apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-preview-${{ github.sha }}
          restore-keys: ccache-preview-

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build build

      # Gate the exact artifact that ships. The `build` job runs this against a
      # Debug build; at -O2 some JS-library symbols are wired via GOT.func rather
      # than env imports, so the Release config the preview deploys must be
      # checked too, or a Release-only resolution gap would ship unnoticed.
      - name: Check plugin symbol resolution (release)
        run: |
          node scripts/check-plugin-symbols.test.mjs
          node scripts/check-plugin-symbols.mjs build

      # Stage only the web outputs. Publishing the raw build/ tree would commit
      # _deps/ (a gitlink) to gh-pages and break the Pages branch build.
      - name: Stage site
        run: sh scripts/stage-site.sh build public

      - name: Upload staged site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: public

  # Hand the staged preview to the single gh-pages writer. Routing through
  # pages-deploy means the preview shares one serialised queue with the main
  # deploy — they can never race to write gh-pages.
  preview-deploy:
    if: github.event_name == 'pull_request'
    needs: preview-build
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    uses: ./.github/workflows/pages-deploy.yml
    with:
      mode: preview
