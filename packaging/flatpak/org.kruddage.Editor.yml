id: org.kruddage.Editor
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: krudd-editor-qt

# Vulkan for the native Dawn/WebGPU backend, plus a display socket. No
# filesystem/network access requested — the editor doesn't need it yet.
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: krudd-editor
    buildsystem: simple
    # dist/bin/krudd-editor-qt is staged by CI (see
    # .github/workflows/flatpak-build.yml) from a build done on the runner,
    # not inside this sandbox — see packaging/flatpak/README.md for why, and
    # what "real" packaging (building against org.kde.Sdk's Qt6 + Dawn as a
    # module) still needs to look like.
    build-commands:
      - install -Dm755 dist/bin/krudd-editor-qt /app/bin/krudd-editor-qt
      - install -Dm644 org.kruddage.Editor.desktop
        /app/share/applications/org.kruddage.Editor.desktop
    sources:
      - type: dir
        path: dist
        dest: dist
      - type: file
        path: org.kruddage.Editor.desktop
