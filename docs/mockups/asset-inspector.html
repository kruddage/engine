<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-2.0-or-later -->
<!--
  Asset Inspector — STATIC MOCKUP (no engine code).

  Reflects the locked v1 design for issue #185:
    * Replace-on-select: the Assets tab shows the table; clicking a row
      REPLACES it with the inspector, with a "back to list" breadcrumb.
    * Declaration renders as a key/value property table (native kruddboard
      idiom), NOT a syntax-highlighted code block.
    * v1 scope is the existing 4 built-in meshes only. The texture/material/
      shader/font/scene rows below are shown greyed as "proposed, later" to
      illustrate the type discriminator — they are NOT part of v1.
    * No filter box in v1.

  All data is hand-authored placeholder. Open in any browser.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KRUDD — Asset Inspector (mockup)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
	--bg:        #0d0d0d;
	--panel:     #141414;
	--panel-2:   #181818;
	--line:      #242424;
	--line-2:    #2e2e2e;
	--text:      #e0e0e0;
	--dim:       #777;
	--dimmer:    #555;
	--accent:    #ff9a3c; /* the kruddboard "RO" orange */
	--accent-2:  #4ec9b0;
	--green:     #8ad17a;
	--sel:       #243140;
	--sel-line:  #3a5a78;
}

body {
	background: var(--bg);
	color: var(--text);
	font-family: 'Courier New', Courier, monospace;
	height: 100vh;
	display: flex;
	flex-direction: column;
	overflow: hidden;
	font-size: 13px;
}

header {
	padding: 10px 18px;
	display: flex;
	align-items: baseline;
	gap: 12px;
	border-bottom: 1px solid var(--line);
	flex-shrink: 0;
}
.wordmark { font-size: 16px; font-weight: bold; letter-spacing: 0.22em; color: #fff; }
.crumb { font-size: 11px; color: var(--dimmer); letter-spacing: 0.1em; }
.crumb b { color: var(--dim); font-weight: normal; }
.hint { margin-left: auto; font-size: 11px; color: var(--dimmer); }

/* Mirrors the kruddboard window: full-width panel anchored to the top. */
.board {
	margin: 16px auto 0;
	width: min(960px, calc(100% - 32px));
	background: var(--panel);
	border: 1px solid var(--line);
	border-radius: 5px;
	overflow: hidden;
}
.board-head {
	display: flex; align-items: center; gap: 10px;
	padding: 9px 14px; border-bottom: 1px solid var(--line);
}
.board-head .ed { font-size: 11px; letter-spacing: 0.16em; color: var(--dimmer); }
.board-head .tabs { display: flex; gap: 4px; margin-left: 8px; }
.tab { font-size: 11px; padding: 3px 10px; color: var(--dim); border-radius: 3px 3px 0 0; }
.tab.active { color: #fff; background: var(--panel-2); border-bottom: 2px solid var(--accent); }
.board-head .tohide { margin-left: auto; font-size: 11px; color: var(--dimmer); }

.body { padding: 12px 14px 16px; }

/* ---------------- table (list view) ---------------- */
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead th {
	text-align: left; font-weight: normal; color: var(--dim);
	border-bottom: 1px solid var(--line-2); padding: 5px 8px; letter-spacing: 0.06em;
}
.grouprow td {
	color: var(--dimmer); font-size: 10px; letter-spacing: 0.16em;
	padding: 10px 8px 4px; text-transform: uppercase;
}
tbody tr.asset { cursor: pointer; }
tbody tr.asset:hover td { background: var(--panel-2); }
tbody td { padding: 5px 8px; border-bottom: 1px solid #1c1c1c; white-space: nowrap; }
td.path { color: var(--text); }
td.path .ico { color: var(--dim); margin-right: 8px; }
.type-tag {
	font-size: 9px; letter-spacing: 0.06em; padding: 1px 5px; border-radius: 3px;
	color: var(--dim); border: 1px solid var(--line-2);
}
.ro { color: var(--accent); font-size: 10px; letter-spacing: 0.1em; }
.muted { color: var(--dimmer); }
tr.proposed td { opacity: 0.45; cursor: default; }
tr.proposed:hover td { background: transparent; }
.proposed-note { color: var(--dimmer); font-size: 11px; padding: 12px 8px 2px; }

/* ---------------- inspector (detail view) ---------------- */
.back {
	display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
	color: var(--dim); font-size: 12px; margin-bottom: 12px;
}
.back:hover { color: var(--text); }
.insp-title { font-size: 16px; color: #fff; display: flex; align-items: center; gap: 10px; }
.insp-title .big-ico { color: var(--dim); }
.badges { display: flex; gap: 6px; margin: 8px 0 4px; flex-wrap: wrap; }
.badge {
	font-size: 10px; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 10px;
	border: 1px solid var(--line-2); color: var(--dim);
}
.badge.kind   { color: var(--accent-2); border-color: #2c4a44; }
.badge.ro     { color: var(--accent);   border-color: #4a3420; }
.badge.loaded { color: var(--green);    border-color: #2c4226; }

.section { margin-top: 18px; }
.section h3 {
	font-size: 10px; letter-spacing: 0.2em; color: var(--dimmer);
	text-transform: uppercase; margin-bottom: 8px; font-weight: normal;
}
/* both Declaration and Catalog render as the same two-column property table */
.props { width: 100%; border-collapse: collapse; }
.props tr td { padding: 4px 8px; border-bottom: 1px solid #1c1c1c; vertical-align: top; }
.props td.key { color: var(--dim); width: 180px; white-space: nowrap; }
.props td.val { color: var(--text); }

.note {
	margin-top: 16px; padding: 10px 14px; border-left: 2px solid var(--line-2);
	color: var(--dim); font-size: 12px; line-height: 1.6; background: var(--panel-2);
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 5px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<header>
	<span class="wordmark">KRUDD</span>
	<span class="crumb" id="crumb"><b>kruddboard</b> / Assets</span>
	<span class="hint">mockup — issue #185, v1 design</span>
</header>

<div class="board">
	<div class="board-head">
		<span class="ed">KRUDD EDITOR</span>
		<span class="tabs">
			<span class="tab">Frame Stats</span>
			<span class="tab">Log</span>
			<span class="tab">Subsystems</span>
			<span class="tab active">Assets</span>
		</span>
		<span class="tohide">` to hide</span>
	</div>
	<div class="body" id="body"></div>
</div>

<script>
const ICONS = {
	mesh: '◆', texture: '▦', material: '●',
	shader: '⌗', font: 'A', scene: '⊞',
};

/*
 * v1 assets = the existing 4 built-in meshes. Each carries the catalog
 * fields plus `decl`: an ordered list of [key, value] pairs the inspector
 * renders as a property table (the engine's describe() hook returns the
 * equivalent). `proposed` rows are NOT in v1 — shown greyed to illustrate
 * the type discriminator the inspector keys off.
 */
const ASSETS = [
	{ path:'builtin://cube', type:'mesh', ro:true, state:'Loaded', size:0, refs:0,
	  decl:[['topology','triangles'],['vertices','24'],['indices','36'],
	        ['attributes','position, normal, uv0'],
	        ['bounds.min','{ -0.5, -0.5, -0.5 }'],['bounds.max','{ 0.5, 0.5, 0.5 }']] },

	{ path:'builtin://sphere', type:'mesh', ro:true, state:'Loaded', size:0, refs:2,
	  decl:[['topology','triangles'],['segments','rings 16, sectors 32'],
	        ['vertices','561'],['indices','2880'],
	        ['attributes','position, normal, uv0'],['bounds.radius','0.5']] },

	{ path:'builtin://plane', type:'mesh', ro:true, state:'Loaded', size:0, refs:0,
	  decl:[['topology','triangles'],['vertices','4'],['indices','6'],
	        ['attributes','position, normal, uv0'],['normal','{ 0, 1, 0 }']] },

	{ path:'builtin://pyramid', type:'mesh', ro:true, state:'Loaded', size:0, refs:0,
	  decl:[['topology','triangles'],['vertices','16'],['indices','18'],
	        ['attributes','position, normal, uv0']] },
];

/* Illustrative only — proposed built-in types, NOT part of v1. */
const PROPOSED = [
	{ path:'builtin://white',  type:'texture'  },
	{ path:'builtin://checker',type:'texture'  },
	{ path:'builtin://normal', type:'texture'  },
	{ path:'builtin://default_material', type:'material' },
	{ path:'builtin://unlit',  type:'shader'   },
	{ path:'builtin://debug_font', type:'font' },
	{ path:'builtin://empty_scene', type:'scene' },
];

const bodyEl  = document.getElementById('body');
const crumbEl = document.getElementById('crumb');
let view = { mode: 'list', sel: -1 };

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function renderList() {
	crumbEl.innerHTML = '<b>kruddboard</b> / Assets';
	let rows = '';
	rows += `<tr class="grouprow"><td colspan="5">built-in (read-only)</td></tr>`;
	ASSETS.forEach((a,i) => {
		rows += `<tr class="asset" data-i="${i}">
			<td class="path"><span class="ico">${ICONS[a.type]}</span>${a.path}</td>
			<td><span class="type-tag">${a.type}</span></td>
			<td>${a.state}</td>
			<td>${a.size ? a.size : '<span class="muted">-</span>'}</td>
			<td><span class="ro">RO</span></td>
		</tr>`;
	});
	let prop = '';
	PROPOSED.forEach(a => {
		prop += `<tr class="proposed">
			<td class="path"><span class="ico">${ICONS[a.type]}</span>${a.path}</td>
			<td><span class="type-tag">${a.type}</span></td>
			<td class="muted">-</td><td class="muted">-</td><td class="ro">RO</td>
		</tr>`;
	});

	bodyEl.innerHTML = `
		<table>
			<thead><tr>
				<th>Path</th><th>Type</th><th>State</th><th>Size</th><th>Flags</th>
			</tr></thead>
			<tbody>
				${rows}
				<tr><td colspan="5" class="proposed-note">
					&#8595; proposed for later (not v1) &mdash; shows how the inspector
					keys off an asset's type
				</td></tr>
				${prop}
			</tbody>
		</table>`;
	bodyEl.querySelectorAll('tr.asset').forEach(r =>
		r.addEventListener('click', () => { view = { mode:'detail', sel:+r.dataset.i }; render(); }));
}

function renderDetail() {
	const a = ASSETS[view.sel];
	crumbEl.innerHTML = `<b>kruddboard</b> / Assets / ${a.path}`;
	const declRows = a.decl.map(([k,v]) =>
		`<tr><td class="key">${esc(k)}</td><td class="val">${esc(v)}</td></tr>`).join('');
	const catalog = [
		['path', a.path],
		['kind', a.ro ? 'PRIMITIVE' : 'NORMAL'],
		['type', a.type],
		['state', a.state],
		['size', a.size ? a.size + ' bytes' : '— (generated, no file)'],
		['refs', String(a.refs)],
		['read_only', a.ro ? '1' : '0'],
	].map(([k,v]) => `<tr><td class="key">${k}</td><td class="val">${esc(v)}</td></tr>`).join('');

	bodyEl.innerHTML = `
		<div class="back" id="back">&#8592; back to list</div>
		<div class="insp-title"><span class="big-ico">${ICONS[a.type]}</span>${a.path}</div>
		<div class="badges">
			<span class="badge kind">${a.type}</span>
			<span class="badge loaded">${a.state}</span>
			<span class="badge ro">read-only</span>
		</div>

		<div class="section">
			<h3>Declaration</h3>
			<table class="props">${declRows}</table>
		</div>

		<div class="section">
			<h3>Catalog</h3>
			<table class="props">${catalog}</table>
		</div>

		<div class="note">Built-in asset. Seeded at startup, never evicted, cannot be
		released or overwritten. The declaration is returned by the asset plugin's
		describe() hook from a static descriptor — there is no file on disk.</div>`;
	document.getElementById('back').addEventListener('click', () => { view = { mode:'list', sel:-1 }; render(); });
}

function render() { view.mode === 'detail' ? renderDetail() : renderList(); }
render();
</script>
</body>
</html>
