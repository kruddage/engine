name: clang-tidy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -B build_tidy

      - name: Run clang-tidy
        run: run-clang-tidy -p build_tidy '.*(modules|plugins)/.*\.c$'
