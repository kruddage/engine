name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages is served from the gh-pages branch (root), so we need to push to it.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # Publish the built site to the gh-pages root. keep_files: true preserves
      # the pr-preview/ directories that pr-preview-action manages, so main and
      # PR previews coexist on the same branch.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          keep_files: true
