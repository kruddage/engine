name: Flatpak build (editor, proof of life)

# Builds the native Qt editor (`krudd editor-qt`, #675/#676) as a Flatpak and,
# when a signing key is configured, publishes a self-hosted, GPG-signed
# registry to this repo's gh-pages branch — see packaging/flatpak/README.md
# for the full picture, including the editor's own proof-of-life caveat
# (still an animated clear, not a real scene).
#
# Manual/path-scoped trigger, like every other native-editor target: left out
# of the default per-PR CI (see the root README's CI table) since it needs a
# ~38 MB native Dawn build plus a full Flatpak SDK download.
#
# Signing + publish are opt-in per fork/checkout: they run only when
# FLATPAK_GPG_PRIVATE_KEY is set as a repo secret (see the "signing" step and
# packaging/flatpak/README.md's "hosting your own registry" section). Without
# it, this still builds and validates the Flatpak (unsigned bundle, uploaded
# as a workflow artifact) — it just doesn't publish anywhere.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packaging/flatpak/**
      - .github/workflows/flatpak-build.yml
      - setup.sh

jobs:
  flatpak-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: flatpak-registry-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      # Everything else the native build needs (compiler, cmake, ninja, Qt6,
      # Vulkan loader) is installed by ./setup.sh itself. The runner's Qt6 is
      # only there to satisfy setup.sh — krudd-editor compiles inside the
      # flatpak-builder sandbox against org.kde.Sdk's own Qt6, not the runner's.
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder

      - name: Read pinned Dawn revision (tracks setup.sh)
        id: dawn
        run: echo "rev=$(sed -n 's/^DAWN_REV=//p' setup.sh)" >> "$GITHUB_OUTPUT"

      - name: Cache native Dawn build
        uses: actions/cache@v4
        with:
          path: ~/.krudd/dawn-native
          key: dawn-native-${{ steps.dawn.outputs.rev }}

      # Installs the native toolchain, builds pinned native Dawn (skipped on
      # a cache hit above), and writes .krudd-env with KRUDD_DAWN_PREFIX.
      - name: ./setup.sh
        run: ./setup.sh

      # Native Dawn is the one module the sandbox can't build itself (see the
      # manifest's comments) — vendor the install dir in as a local source.
      - name: Stage native Dawn for the sandbox
        run: |
          . ./.krudd-env
          mkdir -p packaging/flatpak/dawn-native
          cp -r "$KRUDD_DAWN_PREFIX"/. packaging/flatpak/dawn-native/

      - name: Add Flathub remote (org.kde.Platform/Sdk)
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: flatpak-builder
        run: |
          flatpak-builder --user --force-clean --install-deps-from=flathub \
            packaging/flatpak/build-dir \
            packaging/flatpak/io.github.kruddage.Editor.yml

      # Signing is opt-in: forks/self-hosters that want their own signed
      # registry set this secret (see packaging/flatpak/README.md); without
      # it, the steps below still produce an unsigned bundle for local
      # testing but skip publishing.
      - name: Check for a configured signing key
        id: signing
        run: |
          if [ -n "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing key
        if: steps.signing.outputs.enabled == 'true'
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}

      - name: Export the repo (signed)
        if: steps.signing.outputs.enabled == 'true'
        run: |
          flatpak build-export --gpg-sign="${{ steps.gpg.outputs.fingerprint }}" \
            packaging/flatpak/export-repo packaging/flatpak/build-dir

      - name: Export the repo (unsigned — local/test builds only)
        if: steps.signing.outputs.enabled != 'true'
        run: |
          flatpak build-export packaging/flatpak/export-repo packaging/flatpak/build-dir

      - name: Bundle a .flatpak for the workflow artifact
        run: |
          if [ "${{ steps.signing.outputs.enabled }}" = true ]; then
            sign_arg="--gpg-sign=${{ steps.gpg.outputs.fingerprint }}"
          else
            sign_arg=""
          fi
          flatpak build-bundle $sign_arg packaging/flatpak/export-repo \
            krudd-editor.flatpak io.github.kruddage.Editor

      - name: Upload .flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: krudd-editor-flatpak
          path: krudd-editor.flatpak

      # Publish only the authoritative build: a signed export, on main. A
      # fork with its own FLATPAK_GPG_PRIVATE_KEY set gets its own registry
      # published to *its own* gh-pages, at its own <owner>.github.io/<repo>/
      # URL — nothing here is kruddage-specific.
      - name: Publish the signed registry to gh-pages
        if: steps.signing.outputs.enabled == 'true' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          repo_url="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/flatpak/"
          mkdir -p packaging/flatpak/pages-out
          cp -r packaging/flatpak/export-repo/. packaging/flatpak/pages-out/
          ./packaging/flatpak/make-flatpakrepo.sh "$repo_url" \
            "${{ steps.gpg.outputs.fingerprint }}" \
            packaging/flatpak/pages-out/krudd.flatpakrepo

      - name: Deploy to gh-pages
        if: steps.signing.outputs.enabled == 'true' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packaging/flatpak/pages-out
          publish_branch: gh-pages
          destination_dir: flatpak
          keep_files: true
